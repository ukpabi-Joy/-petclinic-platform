# Petclinic MySQL schema.
#
# This schema is the canonical Spring Petclinic MySQL DDL, sourced from:
#   spring-petclinic-microservices/src/main/resources/db/mysql/schema.sql
#
# It is the shared `petclinic` schema used by customers-service,
# vets-service and visits-service. Regenerate this ConfigMap from the source
# repo when the upstream schema changes, e.g.:
#
#   kubectl create configmap petclinic-db-schema -n petclinic-dev \
#     --from-file=schema.sql=spring-petclinic-microservices/src/main/resources/db/mysql/schema.sql \
#     --dry-run=client -o yaml > k8s/database/schema-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: petclinic-db-schema
  namespace: petclinic-dev
  labels:
    app.kubernetes.io/name: petclinic-db-schema
    app.kubernetes.io/part-of: petclinic
data:
  schema.sql: |
    -- Tables: owners, pets, types, vets, specialties, vet_specialties, visits
    SET foreign_key_checks = 0;

    CREATE TABLE IF NOT EXISTS types (
      id   INT(4) UNSIGNED NOT NULL AUTO_INCREMENT,
      name VARCHAR(80),
      INDEX(name),
      PRIMARY KEY (id)
    ) engine=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS owners (
      id         INT(4) UNSIGNED NOT NULL AUTO_INCREMENT,
      first_name VARCHAR(30),
      last_name  VARCHAR(30),
      address    VARCHAR(255),
      city       VARCHAR(80),
      telephone  VARCHAR(20),
      INDEX(last_name),
      PRIMARY KEY (id)
    ) engine=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS pets (
      id         INT(4) UNSIGNED NOT NULL AUTO_INCREMENT,
      name       VARCHAR(30),
      birth_date DATE,
      type_id    INT(4) UNSIGNED NOT NULL,
      owner_id   INT(4) UNSIGNED NOT NULL,
      INDEX(name),
      INDEX(owner_id),
      PRIMARY KEY (id)
    ) engine=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS vets (
      id         INT(4) UNSIGNED NOT NULL AUTO_INCREMENT,
      first_name VARCHAR(30),
      last_name  VARCHAR(30),
      INDEX(last_name),
      PRIMARY KEY (id)
    ) engine=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS specialties (
      id   INT(4) UNSIGNED NOT NULL AUTO_INCREMENT,
      name VARCHAR(80),
      INDEX(name),
      PRIMARY KEY (id)
    ) engine=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS vet_specialties (
      vet_id       INT(4) UNSIGNED NOT NULL,
      specialty_id INT(4) UNSIGNED NOT NULL,
      FOREIGN KEY (vet_id) REFERENCES vets(id),
      FOREIGN KEY (specialty_id) REFERENCES specialties(id),
      UNIQUE (vet_id, specialty_id)
    ) engine=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS visits (
      id          INT(4) UNSIGNED NOT NULL AUTO_INCREMENT,
      pet_id      INT(4) UNSIGNED NOT NULL,
      visit_date  DATE,
      description VARCHAR(8192),
      INDEX(pet_id),
      PRIMARY KEY (id)
    ) engine=InnoDB DEFAULT CHARSET=utf8mb4;

    SET foreign_key_checks = 1;
