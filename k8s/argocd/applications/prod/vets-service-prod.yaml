apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vets-service-prod
  namespace: argocd
  labels:
    project: petclinic
    environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/ukpabi-Joy/-petclinic-platform.git
    targetRevision: main
    path: helm/petclinic-service
    helm:
      releaseName: vets-service
      valueFiles:
        - ../../helm-values/vets-service.yaml
        - ../../helm-values/prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-prod
  syncOptions:
    - CreateNamespace=true
    - PruneLast=true
    - ApplyOutOfSyncOnly=true
