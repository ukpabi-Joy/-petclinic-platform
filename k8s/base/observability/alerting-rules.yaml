apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: petclinic-alerts
  namespace: monitoring
  labels:
    app: prometheus
spec:
  groups:
    - name: petclinic.rules
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: High HTTP error rate detected
            description: More than 5% of requests are returning 5xx errors

        - alert: PodRestartLoop
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace=~"petclinic-.*"}[15m]) > 5
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: Pod is in restart loop
            description: Pod {{ $labels.pod }} restarted more than 5 times in 15 minutes

        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{
              namespace=~"petclinic-.*", container!=""})
            / sum(kube_pod_container_resource_limits{
              namespace=~"petclinic-.*", resource="memory"}) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: High memory usage detected
            description: Memory usage is above 80% of limit

        - alert: ServiceDown
          expr: |
            up{job=~"api-gateway|customers-service|visits-service|vets-service|genai-service"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: Service is down
            description: Service {{ $labels.job }} has been unreachable for 2 minutes

        - alert: SlowResponseTime
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job)
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Slow response time detected
            description: P99 latency for {{ $labels.job }} is above 2 seconds
