# SPOT OVERRIDE for dev environment
# Apply this file AFTER the Graviton free trial expires (Dec 2026)
# to enable Spot savings (~70% cost reduction)
# Command: kubectl apply -f k8s/base/karpenter/nodepool-spot-dev.yaml
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: petclinic-dev
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t4g.small", "t4g.medium"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["eu-central-1a", "eu-central-1b", "eu-central-1c"]
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1
        kind: EC2NodeClass
        name: petclinic-dev
  limits:
    cpu: "8"
    memory: 32Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s
