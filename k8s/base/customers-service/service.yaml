# Customers Service (PetclinicPlatform41). ClusterIP on 8081.
apiVersion: v1
kind: Service
metadata:
  name: customers-service
  labels:
    app.kubernetes.io/name: customers-service
    app.kubernetes.io/component: customers-service
    app.kubernetes.io/part-of: petclinic
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: customers-service
  ports:
    - name: http
      port: 8081
      targetPort: http
