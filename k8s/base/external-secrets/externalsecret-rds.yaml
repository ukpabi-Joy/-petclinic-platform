# ExternalSecret for the RDS database credentials (PetclinicPlatform35).
#
# Syncs the RDS secret from AWS Secrets Manager into the petclinic-db-credentials
# Kubernetes Secret in the petclinic-dev namespace, refreshed hourly.
#
# Source path note: the technical spec refers to this as "petclinic/dev/rds".
# The actual secret is created by the rds Terraform module at
# "petclinic/dev/db-credentials" (it owns the generated master password), so the
# remoteRef below targets that real name. dataFrom.extract maps every JSON field
# (username, password, host, port, dbname) into the resulting K8s secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: petclinic-db-credentials
  namespace: petclinic-dev
  labels:
    app.kubernetes.io/part-of: petclinic
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: petclinic-db-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: petclinic/dev/db-credentials
