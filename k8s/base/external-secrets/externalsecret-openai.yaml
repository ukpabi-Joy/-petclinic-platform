# ExternalSecret for the OpenAI API key (PetclinicPlatform36).
#
# Syncs petclinic/dev/openai from AWS Secrets Manager into the openai-api-key
# Kubernetes Secret in the petclinic-dev namespace, refreshed hourly.
# genai-service reads the OPENAI_API_KEY env var from this secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openai-api-key
  namespace: petclinic-dev
  labels:
    app.kubernetes.io/part-of: petclinic
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: openai-api-key
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: petclinic/dev/openai
