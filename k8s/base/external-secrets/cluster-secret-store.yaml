# ClusterSecretStore pointing at AWS Secrets Manager (PetclinicPlatform34).
#
# A cluster-scoped store so ExternalSecrets in any namespace (petclinic-dev,
# petclinic-prod) can reference it. ESO authenticates with the IRSA role
# attached to its service account (jwt auth via the operator's SA), so no
# static AWS credentials are needed.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: petclinic
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
