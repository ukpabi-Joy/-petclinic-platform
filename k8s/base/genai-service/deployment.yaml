# GenAI Service (PetclinicPlatform42).
#
# Spring AI service on port 8084. Two init containers enforce startup order:
# wait-for-config-server then wait-for-discovery-server (busybox wget loops).
# The OpenAI API key is injected from the openai-api-key Secret synced by
# External Secrets Operator from petclinic/dev/openai (Epic 7).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-service
  labels:
    app.kubernetes.io/name: genai-service
    app.kubernetes.io/component: genai-service
    app.kubernetes.io/part-of: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: genai-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: genai-service
        app.kubernetes.io/component: genai-service
        app.kubernetes.io/part-of: petclinic
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for config-server:8888 ..."
              until wget -q --spider http://config-server:8888/actuator/health; do
                echo "config-server not ready yet; retrying in 5s"
                sleep 5
              done
              echo "config-server is up."
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
        - name: wait-for-discovery-server
          image: busybox:1.36
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for discovery-server:8761 ..."
              until wget -q --spider http://discovery-server:8761/actuator/health; do
                echo "discovery-server not ready yet; retrying in 5s"
                sleep 5
              done
              echo "discovery-server is up."
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      containers:
        - name: genai-service
          image: petclinic/genai-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka/"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: OPENAI_API_KEY
            - name: SPRING_AI_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: OPENAI_API_KEY
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
