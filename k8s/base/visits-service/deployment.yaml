# Visits Service (PetclinicPlatform41).
#
# Domain service on port 8081. Two init containers enforce startup order:
# wait-for-config-server then wait-for-discovery-server (busybox wget loops).
# Database credentials are read from the petclinic-db-credentials Secret synced
# by External Secrets Operator (Epic 7). The JDBC URL is assembled from the
# secret's host/port/dbname fields via $(VAR) interpolation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visits-service
  labels:
    app.kubernetes.io/name: visits-service
    app.kubernetes.io/component: visits-service
    app.kubernetes.io/part-of: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: visits-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: visits-service
        app.kubernetes.io/component: visits-service
        app.kubernetes.io/part-of: petclinic
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for config-server:8888 ..."
              until wget -q --spider http://config-server:8888/actuator/health; do
                echo "config-server not ready yet; retrying in 5s"
                sleep 5
              done
              echo "config-server is up."
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
        - name: wait-for-discovery-server
          image: busybox:1.36
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for discovery-server:8761 ..."
              until wget -q --spider http://discovery-server:8761/actuator/health; do
                echo "discovery-server not ready yet; retrying in 5s"
                sleep 5
              done
              echo "discovery-server is up."
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      containers:
        - name: visits-service
          image: petclinic/visits-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker,mysql"
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka/"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-credentials
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-credentials
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-credentials
                  key: dbname
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-credentials
                  key: password
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
