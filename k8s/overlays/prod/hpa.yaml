# HorizontalPodAutoscalers for prod (PetclinicPlatform47).
#
# HPA is configured only for api-gateway, customers-service, visits-service and
# vets-service. min 2 / max 4 replicas, scaling on 70% average CPU utilization.
# Requires the Metrics Server (Epic 13). namespace is injected by the prod
# overlay's `namespace:` field.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: petclinic
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
