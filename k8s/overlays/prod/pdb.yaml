# PodDisruptionBudgets for prod (PetclinicPlatform46).
#
# One PDB per service, minAvailable: 1 — keeps at least one Pod serving during
# voluntary disruptions (node drains, rollouts). namespace is injected by the
# prod overlay's `namespace:` field.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: config-server
  labels:
    app.kubernetes.io/name: config-server
    app.kubernetes.io/part-of: petclinic
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: config-server
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: discovery-server
  labels:
    app.kubernetes.io/name: discovery-server
    app.kubernetes.io/part-of: petclinic
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: discovery-server
