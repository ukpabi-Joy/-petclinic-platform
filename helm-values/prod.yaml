# Prod environment overrides (PetclinicPlatform109) — mirrors k8s/overlays/prod/.
#
# Applied LAST in the values chain, so it wins:
#   values.yaml -> {service}.yaml -> prod.yaml
#
# Prod = 2 replicas, 250m/512Mi requests, prod ECR registry, PDB for every
# service, and HPA for the services whose values file sets autoscaling.enabled
# (api-gateway, customers/visits/vets-service). Deploy into petclinic-prod.

replicaCount: 2

image:
  # Immutable prod ECR registry + repo prefix.
  registry: 506261418156.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Do NOT set autoscaling.enabled here — let each service's own value decide, so
# HPA renders only for the four HPA-eligible services and not for the rest.
autoscaling:
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

# PodDisruptionBudget for every service in prod.
pdb:
  enabled: true
  minAvailable: 1
