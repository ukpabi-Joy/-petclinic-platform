# Visits Service values (PetclinicPlatform108) — mirrors k8s/base/visits-service/.
#
# Domain service. Waits for config-server then discovery-server. DB credentials
# come from the petclinic-db-credentials Secret (External Secrets Operator);
# the JDBC URL is assembled via $(VAR) interpolation. HPA-eligible (prod).
nameOverride: visits-service

image:
  repository: visits-service

service:
  port: 8082

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "docker,mysql"
  - name: SPRING_CONFIG_IMPORT
    value: "configserver:http://config-server:8888"
  - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
    value: "http://discovery-server:8761/eureka/"
  - name: DB_HOST
    valueFrom:
      secretKeyRef:
        name: petclinic-db-credentials
        key: host
  - name: DB_PORT
    valueFrom:
      secretKeyRef:
        name: petclinic-db-credentials
        key: port
  - name: DB_NAME
    valueFrom:
      secretKeyRef:
        name: petclinic-db-credentials
        key: dbname
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: petclinic-db-credentials
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: petclinic-db-credentials
        key: password
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:mysql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)"

initContainers:
  - name: wait-for-config-server
    host: config-server
    port: 8888
    path: /actuator/health
  - name: wait-for-discovery-server
    host: discovery-server
    port: 8761
    path: /actuator/health

# HPA-eligible service. dev.yaml forces autoscaling off so this is prod-only.
autoscaling:
  enabled: true
